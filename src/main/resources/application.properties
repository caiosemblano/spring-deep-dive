# 1. Configurações de Conexão com o Banco
spring.datasource.url=jdbc:mysql://localhost:3307/spring-deep-dive?createDatabaseIfNotExist=true
spring.datasource.username=caio
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Informar o Dialeto do MySQL explicitamente para o Hibernate parar de tentar adivinhar
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 3. (Opcional, mas recomendado) Mostrar o SQL no terminal para ajudar a debugar depois
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update